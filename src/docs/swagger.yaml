openapi: 3.0.0
info:
  title: AI-assisted Complaint Resolution System API
  version: 3.1.0
  description: Role-based complaint management system with AI-powered features
servers:
  - url: https://ai-complaint-backend-7xc5.onrender.com/api
    description: Production
  - url: http://localhost:5000/api
    description: Local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    User:
      type: object
      properties:
        _id:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [Citizen, DeptHead, OrgAdmin, OrgHead, SysAdmin]
        organization:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
          nullable: true
        department:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastLogin:
          type: string
          format: date-time
          nullable: true

    Organization:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        code:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Department:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        code:
          type: string
        description:
          type: string
          nullable: true
        organization:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
        head:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Complaint:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [Submitted, Manual Review, In Progress, Resolved, Rejected]
        priority:
          type: string
          enum: [Low, Medium, High, Critical]
        isSpam:
          type: boolean
        department:
          type: object
          nullable: true
        submittedBy:
          type: object
        organization:
          type: object
        createdAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        _id:
          type: string
        commentText:
          type: string
        author:
          type: object
        createdAt:
          type: string
          format: date-time

    AnalyticsSummary:
      type: object
      properties:
        total:
          type: integer
        resolved:
          type: integer
        pending:
          type: integer
        resolvedPercentage:
          type: integer

  responses:
    Unauthorized:
      description: Unauthorized
    Forbidden:
      description: Forbidden
    NotFound:
      description: Not found

paths:
  # ========== AUTHENTICATION ==========
  /auth/register:
    post:
      summary: Register citizen
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Registered successfully

  /auth/login:
    post:
      summary: Login user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful

  /auth/profile:
    get:
      summary: Get current user profile
      tags: [Authentication]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile

  # ========== USER MANAGEMENT ==========
  /users/org-admins:
    post:
      summary: Create OrgAdmin (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password, organizationId]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                organizationId:
                  type: string
      responses:
        '201':
          description: OrgAdmin created
    get:
      summary: List OrgAdmins (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of OrgAdmins

  /users/org-admins/{id}:
    put:
      summary: Update OrgAdmin (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                isActive:
                  type: boolean
      responses:
        '200':
          description: OrgAdmin updated

  /users/org-admins/{id}/deactivate:
    put:
      summary: Deactivate OrgAdmin (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OrgAdmin deactivated

  /users/org-heads:
    post:
      summary: Create OrgHead (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password, organizationId]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                organizationId:
                  type: string
      responses:
        '201':
          description: OrgHead created
    get:
      summary: List OrgHeads (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of OrgHeads

  /users/org-heads/{id}:
    put:
      summary: Update OrgHead (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                organizationId:
                  type: string
                isActive:
                  type: boolean
      responses:
        '200':
          description: OrgHead updated

  /users/org-heads/{id}/deactivate:
    put:
      summary: Deactivate OrgHead (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OrgHead deactivated

  /users/dept-heads:
    post:
      summary: Create DeptHead (OrgAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password, departmentId]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                departmentId:
                  type: string
      responses:
        '201':
          description: DeptHead created
    get:
      summary: List DeptHeads (OrgAdmin, OrgHead)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of DeptHeads

  /users/dept-heads/{id}:
    put:
      summary: Update DeptHead (OrgAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                departmentId:
                  type: string
                isActive:
                  type: boolean
      responses:
        '200':
          description: DeptHead updated

  /users/dept-heads/{id}/deactivate:
    put:
      summary: Deactivate DeptHead (OrgAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: DeptHead deactivated

  # ========== ORGANIZATIONS ==========
  /organizations:
    post:
      summary: Create organization (SysAdmin only)
      tags: [Organizations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name:
                  type: string
                code:
                  type: string
      responses:
        '201':
          description: Organization created
    get:
      summary: List organizations (SysAdmin only)
      tags: [Organizations]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of organizations

  /organizations/citizen-list:
    get:
      summary: List organizations for citizens
      tags: [Organizations]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of active organizations

  /organizations/{id}:
    put:
      summary: Update organization (SysAdmin only)
      tags: [Organizations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                code:
                  type: string
                isActive:
                  type: boolean
      responses:
        '200':
          description: Organization updated

  /organizations/{id}/deactivate:
    put:
      summary: Deactivate organization (SysAdmin only)
      tags: [Organizations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Organization deactivated

  # ========== DEPARTMENTS ==========
  /departments:
    post:
      summary: Create department (OrgAdmin only)
      tags: [Departments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name:
                  type: string
                code:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Department created
    get:
      summary: List departments (OrgAdmin, OrgHead)
      tags: [Departments]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of departments

  /departments/{id}:
    put:
      summary: Update department (OrgAdmin only)
      tags: [Departments]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                code:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Department updated

  /departments/{id}/deactivate:
    put:
      summary: Deactivate department (OrgAdmin only)
      tags: [Departments]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Department deactivated

  # ========== COMPLAINTS ==========
  /complaints:
    post:
      summary: Submit complaint (Citizen)
      tags: [Complaints]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, organizationId]
              properties:
                title:
                  type: string
                description:
                  type: string
                organizationId:
                  type: string
                attachments:
                  type: array
                  items:
                    type: object
                    properties:
                      url:
                        type: string
                latitude:
                  type: number
                longitude:
                  type: number
      responses:
        '201':
          description: Complaint submitted

  /complaints/my-complaints:
    get:
      summary: Get my complaints (Citizen)
      tags: [Complaints]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of user's complaints

  /complaints/assigned:
    get:
      summary: Get assigned complaints (DeptHead)
      tags: [Complaints]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of assigned complaints

  /complaints/organization:
    get:
      summary: Get organization complaints (OrgHead)
      tags: [Complaints]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of organization complaints

  /complaints/{id}/status:
    put:
      summary: Update complaint status (DeptHead)
      tags: [Complaints]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [In Progress, Resolved]
      responses:
        '200':
          description: Status updated

  /complaints/{id}/override:
    put:
      summary: Override complaint (OrgHead)
      tags: [Complaints]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                department:
                  type: string
                priority:
                  type: string
                  enum: [Low, Medium, High, Critical]
                status:
                  type: string
                  enum: [Submitted, Manual Review, In Progress, Resolved, Rejected]
                isSpam:
                  type: boolean
                comment:
                  type: string
      responses:
        '200':
          description: Override successful

  /complaints/{id}/comments:
    post:
      summary: Add comment (DeptHead, OrgHead)
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [commentText]
              properties:
                commentText:
                  type: string
      responses:
        '201':
          description: Comment added
    get:
      summary: Get comments (DeptHead, OrgHead)
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of comments

  # ========== AI MODERATION ==========
  /ai/moderate:
    post:
      summary: Run AI moderation on complaint
      tags: [AI]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [complaintId]
              properties:
                complaintId:
                  type: string
      responses:
        '200':
          description: AI moderation completed

  # ========== NOTIFICATIONS ==========
  /notifications:
    get:
      summary: Get user notifications
      tags: [Notifications]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of notifications

  /notifications/{id}/read:
    put:
      summary: Mark notification as read
      tags: [Notifications]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Notification marked as read

  /notifications/read-all:
    put:
      summary: Mark all notifications as read
      tags: [Notifications]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All notifications marked as read

  # ========== ANALYTICS ==========
  /analytics/dept-head:
    get:
      summary: DeptHead dashboard stats
      tags: [Analytics]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Department statistics

  /analytics/org-head:
    get:
      summary: OrgHead dashboard stats
      tags: [Analytics]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Organization statistics

  /analytics/sys-admin:
    get:
      summary: SysAdmin dashboard stats
      tags: [Analytics]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: System-wide statistics

  /analytics/citizen:
    get:
      summary: Citizen dashboard stats
      tags: [Analytics]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Personal complaint statistics