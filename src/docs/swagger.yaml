openapi: 3.0.0
info:
  title: AI-assisted Complaint Resolution System API
  version: 3.1.0
  description: Role-based complaint management system with AI-powered features
servers:
  - url: https://ai-complaint-backend-7xc5.onrender.com/api
    description: Production
  - url: http://localhost:5000/api
    description: Local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    User:
      type: object
      properties:
        _id:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [Citizen, DeptHead, OrgAdmin, OrgHead, SysAdmin]
        organization:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
          nullable: true
        department:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastLogin:
          type: string
          format: date-time
          nullable: true

    Organization:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        code:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Department:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        code:
          type: string
        description:
          type: string
          nullable: true
        organization:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
        head:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Complaint:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [Submitted, Manual Review, In Progress, Resolved, Rejected]
        priority:
          type: string
          enum: [Low, Medium, High, Critical]
        isSpam:
          type: boolean
        department:
          type: object
          nullable: true
        organization:
          type: object
        submittedBy:
          type: object
        location:
          type: object
          nullable: true
        attachments:
          type: array
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true

    CitizenComplaint:
      type: object
      description: Simplified complaint view for citizens
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        organization:
          type: string
        location:
          type: object
          nullable: true
        attachments:
          type: array

    Comment:
      type: object
      properties:
        _id:
          type: string
        commentText:
          type: string
        author:
          type: object
        createdAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        _id:
          type: string
        type:
          type: string
        title:
          type: string
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AnalyticsSummary:
      type: object
      properties:
        total:
          type: integer
        resolved:
          type: integer
        pending:
          type: integer
        resolvedPercentage:
          type: integer

  responses:
    Unauthorized:
      description: Unauthorized
    Forbidden:
      description: Forbidden
    NotFound:
      description: Not found

paths:
  # ========== AUTHENTICATION ==========
  /auth/register:
    post:
      summary: Register citizen
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Registered successfully

  /auth/login:
    post:
      summary: Login user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful

  /auth/profile:
    get:
      summary: Get current user profile
      tags: [Authentication]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile

  /auth/change-password:
    post:
      summary: Change password
      tags: [Authentication]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password changed

  /auth/forgot-password:
    post:
      summary: Request password reset
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Reset link sent

  /auth/reset-password:
    post:
      summary: Reset password with token
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, email, password]
              properties:
                token:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Password reset

  /auth/forgot-password-otp:
    post:
      summary: Request OTP for password reset
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        '200':
          description: OTP sent

  /auth/reset-password-otp:
    post:
      summary: Reset password with OTP
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, password]
              properties:
                email:
                  type: string
                otp:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Password reset

  /auth/logout:
    post:
      summary: Logout
      tags: [Authentication]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out

  # ========== USER MANAGEMENT ==========
  /users/org-admins:
    post:
      summary: Create OrgAdmin (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password, organizationId]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                organizationId:
                  type: string
      responses:
        '201':
          description: Created
    get:
      summary: List OrgAdmins (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List

  /users/org-admins/{id}:
    put:
      summary: Update OrgAdmin
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                isActive:
                  type: boolean
      responses:
        '200':
          description: Updated

  /users/org-admins/{id}/deactivate:
    put:
      summary: Deactivate OrgAdmin
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        '200':
          description: Deactivated

  /users/org-heads:
    post:
      summary: Create OrgHead (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password, organizationId]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                organizationId:
                  type: string
      responses:
        '201':
          description: Created
    get:
      summary: List OrgHeads (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List

  /users/org-heads/{id}:
    put:
      summary: Update OrgHead
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                organizationId:
                  type: string
                isActive:
                  type: boolean
      responses:
        '200':
          description: Updated

  /users/org-heads/{id}/deactivate:
    put:
      summary: Deactivate OrgHead
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        '200':
          description: Deactivated

  /users/dept-heads:
    post:
      summary: Create DeptHead (OrgAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password, departmentId]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                departmentId:
                  type: string
      responses:
        '201':
          description: Created
    get:
      summary: List DeptHeads (OrgAdmin, OrgHead)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List

  /users/dept-heads/{id}:
    put:
      summary: Update DeptHead
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                departmentId:
                  type: string
                isActive:
                  type: boolean
      responses:
        '200':
          description: Updated

  /users/dept-heads/{id}/deactivate:
    put:
      summary: Deactivate DeptHead
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        '200':
          description: Deactivated

  # ========== FILE UPLOADS ==========
  /uploads:
    post:
      summary: Upload files
      tags: [File Upload]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                folder:
                  type: string
                complaintId:
                  type: string
      responses:
        '200':
          description: Uploaded
    delete:
      summary: Delete file
      tags: [File Upload]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileKey]
              properties:
                fileKey:
                  type: string
      responses:
        '200':
          description: Deleted

  # ========== ORGANIZATIONS ==========
  /organizations:
    post:
      summary: Create organization (SysAdmin only)
      tags: [Organizations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name:
                  type: string
                code:
                  type: string
      responses:
        '201':
          description: Created
    get:
      summary: List organizations (SysAdmin only)
      tags: [Organizations]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List

  /organizations/citizen-list:
    get:
      summary: List organizations for citizens
      tags: [Organizations]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List

  /organizations/{id}:
    put:
      summary: Update organization
      tags: [Organizations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                code:
                  type: string
                isActive:
                  type: boolean
      responses:
        '200':
          description: Updated

  /organizations/{id}/deactivate:
    put:
      summary: Deactivate organization
      tags: [Organizations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        '200':
          description: Deactivated

  # ========== DEPARTMENTS ==========
  /departments:
    post:
      summary: Create department (OrgAdmin only)
      tags: [Departments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name:
                  type: string
                code:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Created
    get:
      summary: List departments (OrgAdmin, OrgHead)
      tags: [Departments]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List

  /departments/{id}:
    put:
      summary: Update department
      tags: [Departments]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                code:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Updated

  /departments/{id}/deactivate:
    put:
      summary: Deactivate department
      tags: [Departments]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        '200':
          description: Deactivated

  # ========== COMPLAINTS ==========
  /complaints:
    post:
      summary: Submit complaint (Citizen)
      tags: [Complaints]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, organizationId]
              properties:
                title:
                  type: string
                description:
                  type: string
                organizationId:
                  type: string
                attachments:
                  type: array
                  items:
                    type: object
                    properties:
                      url:
                        type: string
                        description: URL of uploaded file from S3
                latitude:
                  type: number
                longitude:
                  type: number
      responses:
        '201':
          description: Complaint submitted successfully

  /complaints/my-complaints:
    get:
      summary: Get my complaints (Citizen)
      tags: [Complaints]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CitizenComplaint'

  /complaints/assigned:
    get:
      summary: Get assigned complaints (DeptHead)
      tags: [Complaints]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of complaints

  /complaints/organization:
    get:
      summary: Get organization complaints (OrgHead)
      tags: [Complaints]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of complaints

  /complaints/{id}/status:
    put:
      summary: Update complaint status (DeptHead)
      tags: [Complaints]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [In Progress, Resolved]
      responses:
        '200':
          description: Updated

  /complaints/{id}/override:
    put:
      summary: Override complaint (OrgHead)
      tags: [Complaints]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                department:
                  type: string
                priority:
                  type: string
                  enum: [Low, Medium, High, Critical]
                status:
                  type: string
                  enum: [Submitted, Manual Review, In Progress, Resolved, Rejected]
                isSpam:
                  type: boolean
                comment:
                  type: string
      responses:
        '200':
          description: Override successful

  /complaints/{id}/comments:
    post:
      summary: Add comment (DeptHead, OrgHead)
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [commentText]
              properties:
                commentText:
                  type: string
      responses:
        '201':
          description: Comment added
    get:
      summary: Get comments (DeptHead, OrgHead)
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        '200':
          description: List of comments

  # ========== AI MODERATION ==========
  /ai/moderate:
    post:
      summary: Run AI moderation (Admin/Testing)
      tags: [AI]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [complaintId]
              properties:
                complaintId:
                  type: string
      responses:
        '200':
          description: AI moderation completed

  /ai/provider-stats:
    get:
      summary: Get AI provider statistics
      tags: [AI]
      security:
        - bearerAuth: []
      description: Returns success/failure rates for Gemini and Groq AI providers. SysAdmin only.
      responses:
        '200':
          description: AI provider statistics retrieved successfully
        '403':
          description: Access denied. SysAdmin privileges required.

  # ========== NOTIFICATIONS ==========
  /notifications:
    get:
      summary: Get notifications
      tags: [Notifications]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of notifications

  /notifications/{id}/read:
    put:
      summary: Mark as read
      tags: [Notifications]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        '200':
          description: Marked as read

  /notifications/read-all:
    put:
      summary: Mark all as read
      tags: [Notifications]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All marked as read

  # ========== ANALYTICS ==========
  /analytics/dept-head:
    get:
      summary: DeptHead stats
      tags: [Analytics]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Department statistics retrieved successfully

  /analytics/org-head:
    get:
      summary: OrgHead stats
      tags: [Analytics]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Organization statistics

  /analytics/sys-admin:
    get:
      summary: SysAdmin stats
      tags: [Analytics]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: System-wide statistics

  /analytics/citizen:
    get:
      summary: Citizen stats
      tags: [Analytics]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Personal statistics retrieved successfully

  /analytics/org-admin:
    get:
      summary: OrgAdmin stats
      tags: [Analytics]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Organization admin analytics retrieved successfully