openapi: 3.0.0
info:
  title: Smart Complaint Management System API
  description: |
    Backend API for the Smart Complaint Management System.
    Supports citizen self-registration, complaint submission, assignment, status updates, comments, user management, and analytics.
  version: 2.0.0
servers:
  - url: https://ai-complaint-backend-7xc5.onrender.com/api
    description: Production Server (Render)
  - url: http://localhost:5000/api
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          example: "Invalid token"
      required:
        - message

    User:
      type: object
      properties:
        _id:
          type: string
          example: 67c4a8b9f2e3d4c5e6789012
        fullName:
          type: string
          example: Abebe Kebede
        email:
          type: string
          example: abebe.kebede@example.com
        role:
          type: string
          enum: [Citizen, DeptAdmin, OrgAdmin, SysAdmin]
          example: Citizen
        organization:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
          nullable: true
        department:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        lastLogin:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean
          example: true

    Organization:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
          example: "EEP"
        code:
          type: string
          example: "EEP"
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Department:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
          example: "EEP - Customer Service"
        code:
          type: string
          example: "CS_EEP"
        description:
          type: string
        head:
          type: string
          nullable: true
          description: ObjectId of the DeptAdmin heading this department
        organization:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
        isActive:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Complaint:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
          example: "Pothole on Bole Road"
        description:
          type: string
          example: "Large pothole causing traffic accidents"
        category:
          type: string
          example: "Road Infrastructure"
        location:
          type: object
          properties:
            type:
              type: string
              enum: [Point]
              default: Point
            coordinates:
              type: array
              items:
                type: number
              minItems: 2
              maxItems: 2
              description: [longitude, latitude]
            locationName:
              type: string
        images:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              uploadedAt:
                type: string
                format: date-time
        submittedBy:
          type: object
          properties:
            _id:
              type: string
            fullName:
              type: string
            email:
              type: string
        department:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
            code:
              type: string
        assignedTo:
          type: object
          properties:
            _id:
              type: string
            fullName:
              type: string
            email:
              type: string
          nullable: true
        status:
          type: string
          enum: [Submitted, In Progress, Resolved, Rejected]
          default: Submitted
        priority:
          type: string
          enum: [Low, Medium, High, Critical]
          default: Medium
        history:
          type: array
          items:
            type: object
            properties:
              action:
                type: string
              by:
                type: object
                properties:
                  _id:
                    type: string
                  fullName:
                    type: string
              comment:
                type: string
              timestamp:
                type: string
                format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        _id:
          type: string
        complaint:
          type: string
          description: Complaint ID
        author:
          type: object
          properties:
            _id:
              type: string
            fullName:
              type: string
            email:
              type: string
        commentText:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
          description: User ID of the recipient
        type:
          type: string
          enum: [COMPLAINT_ASSIGNED, STATUS_UPDATED, COMMENT_ADDED]
        title:
          type: string
        message:
          type: string
        data:
          type: object
          nullable: true
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AnalyticsSummary:
      type: object
      properties:
        total:
          type: integer
        resolved:
          type: integer
        pending:
          type: integer
        resolvedPercentage:
          type: integer

    OrgAdminAnalytics:
      type: object
      properties:
        departments:
          type: array
          items:
            type: object
            properties:
              departmentId:
                type: string
              name:
                type: string
              total:
                type: integer
              resolved:
                type: integer
              pending:
                type: integer
              resolvedPercentage:
                type: integer

    SysAdminAnalytics:
      type: object
      properties:
        organizations:
          type: array
          items:
            type: object
            properties:
              organizationId:
                type: string
              name:
                type: string
              total:
                type: integer
              resolved:
                type: integer
              pending:
                type: integer
              resolvedPercentage:
                type: integer

  responses:
    Unauthorized:
      description: Unauthorized – invalid or missing token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden – insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Bad request - validation error or missing fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  # ========== AUTHENTICATION ==========
  /auth/register:
    post:
      summary: Register a new citizen user (self-registration)
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                  fullName:
                    type: string
                  email:
                    type: string
                  token:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/login:
    post:
      summary: Authenticate user and get JWT
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  _id:
                    type: string
                  role:
                    type: string
                  token:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Account deactivated
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/forgot-password:
    post:
      summary: Request password reset
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Reset link sent
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/reset-password:
    post:
      summary: Reset password with token
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, email, password]
              properties:
                token:
                  type: string
                  description: Reset token received in email
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password reset successful. Please login."
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/forgot-password-otp:
    post:
      summary: Request password reset with OTP
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: OTP sent to email
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OTP has been sent to your email."
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/reset-password-otp:
    post:
      summary: Reset password with OTP
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, password]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  pattern: '^[0-9]{6}$'
                  description: 6-digit OTP received in email
                password:
                  type: string
                  minLength: 6
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password reset successful. Please login."
        '400':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/profile:
    get:
      summary: Get current user's profile
      tags: [Authentication]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /auth/change-password:
    post:
      summary: Change password (requires current password)
      tags: [Authentication]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password changed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  # ========== FILE UPLOADS ==========
  /uploads/single:
    post:
      summary: Upload single file to S3
      tags: [File Upload]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload (JPEG, PNG, GIF or other allowed types)
                folder:
                  type: string
                  description: Optional folder/path in S3
              required: [file]
      responses:
        '200':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: File uploaded successfully
                  file:
                    type: object
                    properties:
                      url:
                        type: string
                      key:
                        type: string
                      originalName:
                        type: string
                      size:
                        type: integer
                      mimetype:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /uploads/multiple:
    post:
      summary: Upload multiple files to S3
      tags: [File Upload]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: The files to upload (max 5)
                folder:
                  type: string
                  description: Optional folder/path in S3
              required: [files]
      responses:
        '200':
          description: Files uploaded successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /uploads/complaint-images:
    post:
      summary: Upload complaint images to S3
      tags: [File Upload]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: The images to upload (max 5)
                complaintId:
                  type: string
                  description: ID of the complaint
              required: [images]
      responses:
        '200':
          description: Complaint images uploaded successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /uploads/:
    delete:
      summary: Delete a file from S3
      tags: [File Upload]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileKey]
              properties:
                fileKey:
                  type: string
                  description: S3 key of the file to delete
      responses:
        '200':
          description: File deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /users/org-admins:
    post:
      summary: Create a new Organization Admin (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password, organizationId]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                organizationId:
                  type: string
      responses:
        '201':
          description: OrgAdmin created
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

    get:
      summary: List all Organization Admins (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of OrgAdmins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /users/org-admins/{id}:
    put:
      summary: Update an Organization Admin (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
      responses:
        '200':
          description: OrgAdmin updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /users/org-admins/{id}/deactivate:
    put:
      summary: Deactivate an Organization Admin (SysAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OrgAdmin deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /users/dept-admins:
    post:
      summary: Create a new Department Admin (OrgAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email, password, departmentId]
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                departmentId:
                  type: string
      responses:
        '201':
          description: DeptAdmin created
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                  fullName:
                    type: string
                  email:
                    type: string
                  role:
                    type: string
                  department:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    get:
      summary: List all Department Admins in the OrgAdmin's organization (OrgAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of DeptAdmins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /users/dept-admins/{id}:
    put:
      summary: Update a Department Admin (OrgAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                departmentId:
                  type: string
      responses:
        '200':
          description: DeptAdmin updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /users/dept-admins/{id}/deactivate:
    put:
      summary: Deactivate a Department Admin (OrgAdmin only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: DeptAdmin deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ========== ORGANIZATIONS ==========
  /organizations:
    post:
      summary: Create a new organization (SysAdmin only)
      tags: [Organizations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name:
                  type: string
                code:
                  type: string
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
    get:
      summary: List all active organizations (SysAdmin only)
      tags: [Organizations]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /organizations/{id}:
    put:
      summary: Update organization (SysAdmin only)
      tags: [Organizations]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                code:
                  type: string
                isActive:
