openapi: 3.0.0
info:
  title: Smart Complaint Management System API
  description: Backend API documentation for the Smart Complaint Management System
  version: 1.0.0

servers:
  - url: https://ai-complaint-backend-7xc5.onrender.com/
    description: Production Server (Render)


  - url: http://localhost:5000/api
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    User:
      type: object
      properties:
        _id:
          type: string
        fullname:
          type: string
        email:
          type: string
        role:
          type: string
          example: Citizen

    Report:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
        location:
          type: string
        status:
          type: string
          example: Submitted
        createdAt:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        _id:
          type: string
        commentText:
          type: string
        createdAt:
          type: string
          format: date-time

paths:

  /auth/register:
    post:
      summary: Register new user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullname
                - email
                - password
                - role
              properties:
                fullname:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  example: Citizen
      responses:
        201:
          description: User registered successfully

  /auth/login:
    post:
      summary: Login user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login successful

  /reports:
    post:
      summary: Create a new complaint report
      tags: [Reports]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
                - category
                - location
              properties:
                title:
                  type: string
                description:
                  type: string
                category:
                  type: string
                location:
                  type: string
      responses:
        201:
          description: Report created successfully

    get:
      summary: Get all reports
      tags: [Reports]
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of reports

  /reports/{id}/assign:
    post:
      summary: Assign report to employee
      tags: [Reports]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - assignedTo
              properties:
                assignedTo:
                  type: string
                assignmentNote:
                  type: string
      responses:
        200:
          description: Report assigned successfully

  /reports/{id}/status:
    patch:
      summary: Update report status
      tags: [Reports]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  example: In Progress
      responses:
        200:
          description: Status updated successfully

  /reports/{id}/comments:
    post:
      summary: Add comment to report
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - commentText
              properties:
                commentText:
                  type: string
      responses:
        201:
          description: Comment added successfully

    get:
      summary: Get report comments
      tags: [Comments]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: List of comments

  /reports/{id}/history:
    get:
      summary: Get report history
      tags: [Reports]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Report history
